<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friendship Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    /* Deepened the gradient for a richer night sky */
    background: radial-gradient(ellipse at 50% 100%, #2a0810 0%, #110306 45%, #050102 100%);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    position: relative;
  }
  canvas { 
    position: absolute; 
    top: 0; left: 0; 
    width: 100%; height: 100%; 
  }

  /* Upgraded pills with modern glassmorphism */
  .pill {
    position: absolute;
    background: rgba(30, 5, 10, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 100, 100, 0.25);
    border-radius: 999px;
    padding: 8px 24px;
    color: #ffd87a;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.08em;
    white-space: nowrap;
    animation: pillFloat ease-in-out infinite;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 
                inset 0 0 12px rgba(255, 50, 50, 0.1);
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 8px rgba(255, 200, 100, 0.3);
  }
  
  @keyframes pillFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  
  .pill-1 { top: 12%; left: 6%;  animation-duration: 4.8s; animation-delay: 0s; }
  .pill-2 { 
    top: 10%; right: 6%; 
    animation-duration: 4.2s; 
    animation-delay: 1.1s; 
    font-style: italic; 
    font-family: 'Playfair Display', serif; 
    font-size: 15px; 
    color: #fff;
  }
  .pill-3 { bottom: 25%; left: 5%; animation-duration: 5.5s; animation-delay: 0.6s; }
  .pill-4 {
    bottom: 35%; left: 50%; transform: translateX(-50%);
    animation-duration: 4.5s; animation-delay: 0.3s;
    animation-name: pillFloatCenter;
    font-size: 15px;
    background: rgba(140, 8, 20, 0.4);
    color: #fff;
  }
  
  @keyframes pillFloatCenter {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-12px); }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="pill pill-1">Good friends are like stars; you don't have to see them to know they are there.</div>
<div class="pill pill-2">Friendship isn't a big thing — it's a million little things.</div>
<div class="pill pill-3">A true friend is the greatest of all blessings.</div>
<div class="pill pill-4">Friends are the family we choose 🌙</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let mouseX = 0; // For interactive wind

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  mouseX = W / 2;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('mousemove', (e) => {
  // Smoothly track mouse for wind effect
  mouseX = e.clientX;
});

// ── TIME & WIND ──
let t = 0;
let currentWind = 0;

// ── STARS (Static Background) ──
const stars = Array.from({length: 150}, () => ({
  x: Math.random(),
  y: Math.random() * 0.7, // Only in the upper 70% of the screen
  r: Math.random() * 1.5,
  alpha: 0.1 + Math.random() * 0.5,
  blinkSpeed: 0.01 + Math.random() * 0.02
}));

function drawStars() {
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    const a = s.alpha + Math.sin(t * s.blinkSpeed * 60) * 0.2;
    ctx.globalAlpha = Math.max(0, Math.min(1, a));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

const shootingStars = [];
function spawnShootingStar() {
  if (shootingStars.length > 4 || Math.random() > 0.02) return;
  const startX = Math.random() * W * 0.6;
  const startY = Math.random() * H * 0.35;
  const length = 80 + Math.random() * 90;
  const speed = 12 + Math.random() * 8;
  const angle = Math.PI * 0.65 + Math.random() * 0.3;
  shootingStars.push({
    x: startX,
    y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    length,
    life: 20 + Math.random() * 12,
    maxLife: 20 + Math.random() * 12,
    width: 1 + Math.random() * 1.5
  });
}

function drawShootingStars() {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 1;
    const alpha = Math.max(0, s.life / s.maxLife);

    ctx.save();
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = s.width;
    ctx.shadowColor = `rgba(255,255,255,${alpha})`;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx * (s.length / (s.vx === 0 ? 1 : Math.abs(s.vx))), s.y - s.vy * (s.length / (s.vy === 0 ? 1 : Math.abs(s.vy))));
    ctx.stroke();
    ctx.restore();

    if (s.life <= 0 || s.x > W + 50 || s.y > H * 0.75) {
      shootingStars.splice(i, 1);
    }
  }
}

// ── FIREFLIES (Organic movement) ──
class Firefly {
  constructor() {
    this.reset();
    this.y = Math.random() * H; // Initial spawn anywhere
  }
  reset() {
    this.x = Math.random() * W;
    this.y = H + 10;
    this.size = 1 + Math.random() * 2.5;
    this.speed = 0.5 + Math.random() * 1;
    this.angle = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
    this.lightPhase = Math.random() * Math.PI * 2;
  }
  update() {
    this.y -= this.speed;
    this.x += Math.sin(t * this.wobbleSpeed * 60 + this.angle) * 1.5;
    this.lightPhase += 0.05;
    
    // Add wind influence
    this.x += currentWind * 2;

    if (this.y < -50 || this.x < -50 || this.x > W + 50) this.reset();
  }
  draw() {
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(this.lightPhase));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffd87a';
    ctx.shadowColor = '#ffb347';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}
const fireflies = Array.from({length: 45}, () => new Firefly());

// ── GRASS ──
const blades = Array.from({length: 180}, () => ({
  x: Math.random(),
  h: 0.05 + Math.random() * 0.2,
  w: 1.5 + Math.random() * 3,
  baseLean: (Math.random() - 0.5) * 0.3,
  phase: Math.random() * Math.PI * 2,
  stiffness: 0.5 + Math.random() * 1, // How much wind affects it
  bright: Math.random()
}));

function drawGrass(isForeground) {
  blades.forEach((b, i) => {
    // Draw half the grass in the back, half in the front for depth
    if ((i % 2 === 0) !== isForeground) return;

    const naturalSway = Math.sin(t * 1.5 + b.phase) * 0.03;
    const windSway = currentWind * b.stiffness;
    const lean = b.baseLean + naturalSway + windSway;
    
    const bx = b.x * W;
    const by = H;
    const th = b.h * H;
    
    // Darker in background, brighter in foreground
    const depthMod = isForeground ? 1 : 0.6;
    const r = Math.floor((10 + b.bright * 20) * depthMod);
    const g = Math.floor((70 + b.bright * 60) * depthMod);
    const bl = Math.floor((40 + b.bright * 30) * depthMod);
    
    const grad = ctx.createLinearGradient(bx, by, bx + lean * th, by - th);
    grad.addColorStop(0, `rgb(${r},${g},${bl})`);
    grad.addColorStop(1, `rgb(${r+20},${g+40},${bl+20})`);
    
    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth = b.w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx + lean * th * 0.5, by - th * 0.6, bx + lean * th, by - th);
    ctx.stroke();
    ctx.restore();
  });
}

// ── DRAWING HELPERS ──
function drawLeaf(cx, cy, angle, len, wid, color1, color2, alpha = 1) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;
  const grad = ctx.createLinearGradient(0, 0, len, 0);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(len * 0.3, -wid, len * 0.7, -wid * 0.7, len, 0);
  ctx.bezierCurveTo(len * 0.7,  wid * 0.7, len * 0.3,  wid, 0, 0);
  ctx.fill();
  ctx.restore();
}

function drawPetal(cx, cy, angle, len, wid, color1, color2) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  
  const grad = ctx.createLinearGradient(0, 0, 0, -len);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  // Refined petal shape (slightly pointed like a lotus/rose)
  ctx.bezierCurveTo(-wid * 0.8, -len * 0.3, -wid * 0.6, -len * 0.9, 0, -len);
  ctx.bezierCurveTo( wid * 0.6, -len * 0.9,  wid * 0.8, -len * 0.3, 0, 0);
  ctx.fill();
  ctx.restore();
}

function drawBud(cx, cy, size, color1, color2, alpha = 1) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalAlpha = alpha;
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── FLOWER ENGINE ──
function easeOutCubic(x) {
  return 1 - Math.pow(1 - x, 3);
}

function drawFlower(fx, fy, stemH, nPetals, baseSize, swayFactor, timeOffset, type = 'red', bloom = 1) {
  // Combine natural sway with interactive wind
  const naturalSway = Math.sin(t * 1.2 + timeOffset) * swayFactor;
  const totalSway = naturalSway + (currentWind * 1.5);
  const bloomEase = easeOutCubic(Math.min(1, Math.max(0, bloom)));

  const stemHeight = stemH * bloomEase;
  const tipX = fx + Math.sin(totalSway) * stemHeight * 0.2;
  const tipY = fy - stemHeight;
  
  ctx.save();
  ctx.globalAlpha = bloomEase;

  // Stem
  const stemGrad = ctx.createLinearGradient(fx, fy, tipX, tipY);
  stemGrad.addColorStop(0, '#0a4030');
  stemGrad.addColorStop(1, '#1b8c6a');
  
  ctx.save();
  ctx.strokeStyle = stemGrad;
  ctx.lineWidth = Math.max(1, stemHeight * 0.015);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.bezierCurveTo(
    fx + Math.sin(totalSway) * stemHeight * 0.05, fy - stemHeight * 0.35,
    tipX + Math.sin(totalSway) * stemHeight * 0.06, tipY + stemHeight * 0.25, 
    tipX, tipY
  );
  ctx.stroke();
  ctx.restore();

  // Leaves
  const midX = fx + Math.sin(totalSway) * stemHeight * 0.07;
  const midY = fy - stemHeight * 0.5;
  drawLeaf(midX, midY, totalSway + 0.6, stemHeight * 0.2, stemHeight * 0.06, '#18a898', '#084840', 0.9 * bloomEase);
  drawLeaf(midX, midY, totalSway - 0.6, -stemHeight * 0.2, stemHeight * 0.06, '#1fbfad', '#0a5f56', 0.9 * bloomEase);

  const budColors = type === 'pink'
    ? ['#ffb7dc', '#ff80c2']
    : type === 'red'
      ? ['#ff8c9e', '#ff4d6b']
      : type === 'gold'
        ? ['#ffe8a5', '#ffc86d']
        : ['#b7d5ff', '#84b6ff'];

  drawBud(fx + Math.sin(totalSway) * stemHeight * 0.12, fy - stemHeight * 0.25, stemHeight * 0.02, budColors[0], budColors[1], bloomEase * 0.8);
  drawBud(fx + Math.sin(totalSway) * stemHeight * 0.18, fy - stemHeight * 0.55, stemHeight * 0.018, budColors[0], budColors[1], bloomEase * 0.75);
  drawBud(fx + Math.sin(totalSway) * stemHeight * 0.08, fy - stemHeight * 0.75, stemHeight * 0.015, budColors[0], budColors[1], bloomEase * 0.7);

  // Breathing effect for petals
  const breath = 1 + Math.sin(t * 2 + timeOffset) * 0.05;
  const basePetalLen = baseSize * breath * bloomEase;
  const basePetalWid = baseSize * 0.35 * breath;

  // Glow
  const glow = 0.5 + 0.5 * Math.sin(t * 3 + timeOffset);
  ctx.save();
  ctx.globalAlpha = bloomEase;
  ctx.shadowColor = type === 'red' ? `rgba(255, 60, 60, ${glow * 0.8})` : type === 'gold' ? `rgba(255, 180, 80, ${glow})` : type === 'pink' ? `rgba(255, 120, 160, ${glow * 0.8})` : `rgba(120, 170, 255, ${glow * 0.8})`;
  ctx.shadowBlur = basePetalLen;

  // Petals (Layered for depth)
  const colors = type === 'red'
    ? [['#7a0010', '#e82030'], ['#a00515', '#ff4d5a']]
    : type === 'gold'
      ? [['#aa5b00', '#ffb347'], ['#d48a18', '#ffd288']]
      : type === 'pink'
        ? [['#9f2f72', '#ff5b9d'], ['#d94082', '#ff84b6']]
        : [['#1c3b7a', '#4d78ff'], ['#3f5fd1', '#88b4ff']];

  const centerColors = type === 'red'
    ? ['#fffbe6', '#ffcc44', '#cc5500']
    : type === 'gold'
      ? ['#fff9e0', '#ffd17c', '#b86c08']
      : type === 'pink'
        ? ['#fff0f7', '#ff9fcb', '#d94b84']
        : ['#e9f1ff', '#88b4ff', '#3f5fd1'];

  const flowerPositions = [0.18, 0.36, 0.54, 0.72, 0.92];
  flowerPositions.forEach(pos => {
    const headX = fx + Math.sin(totalSway) * stemHeight * 0.2 * pos;
    const headY = fy - stemHeight * pos;
    const scale = 0.5 + pos * 0.5;
    const petalLen = basePetalLen * scale;
    const petalWid = basePetalWid * scale;
    const headGlow = glow * (0.7 + pos * 0.3);

    for (let i = 0; i < nPetals; i++) {
      const angle = (i / nPetals) * Math.PI * 2 + totalSway * 0.5;
      drawPetal(headX, headY, angle, petalLen, petalWid, colors[0][0], colors[0][1]);
    }
    for (let i = 0; i < nPetals; i++) {
      const angle = ((i + 0.5) / nPetals) * Math.PI * 2 + totalSway * 0.5;
      drawPetal(headX, headY, angle, petalLen * 0.65, petalWid * 0.65, colors[1][0], colors[1][1]);
    }

    const cGrad = ctx.createRadialGradient(headX, headY, 0, headX, headY, petalLen * 0.25);
    cGrad.addColorStop(0, centerColors[0]);
    cGrad.addColorStop(0.4, centerColors[1]);
    cGrad.addColorStop(1, centerColors[2]);

    ctx.save();
    ctx.shadowColor = `rgba(255, 220, 170, ${headGlow * 0.45})`;
    ctx.shadowBlur = petalLen * 0.25;
    ctx.fillStyle = cGrad;
    ctx.beginPath();
    ctx.arc(headX, headY, petalLen * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  
  ctx.restore();
  ctx.restore();
}

// ── MAIN ANIMATION LOOP ──
function frame() {
  t += 0.016;
  
  // Calculate interactive wind based on mouse position
  // Centers at 0, goes from -0.1 to 0.1
  const targetWind = ((mouseX / W) - 0.5) * 0.2; 
  currentWind += (targetWind - currentWind) * 0.05; // Smooth interpolation

  ctx.clearRect(0, 0, W, H);

  drawStars();
  spawnShootingStar();
  drawShootingStars();
  drawGrass(false); // Background grass

  // Fireflies
  fireflies.forEach(f => {
    f.update();
    f.draw();
  });

  // ── Flowers ──
  const baseY = H + 10;
  const bloom = Math.min(1, t / 2);
  drawFlower(W * 0.12, baseY, H * 0.32, 7, H * 0.07, 0.1, 0.2, 'pink', bloom);
  drawFlower(W * 0.26, baseY, H * 0.48, 8, H * 0.09, 0.08, 0, 'red', bloom);
  drawFlower(W * 0.40, baseY, H * 0.36, 6, H * 0.072, 0.09, 2.1, 'gold', bloom);
  drawFlower(W * 0.52, baseY, H * 0.62, 9, H * 0.106, 0.055, 1.1, 'blue', bloom);
  drawFlower(W * 0.66, baseY, H * 0.42, 7, H * 0.082, 0.08, 3.4, 'red', bloom);
  drawFlower(W * 0.78, baseY, H * 0.30, 5, H * 0.064, 0.1, 4.2, 'pink', bloom);
  drawFlower(W * 0.88, baseY, H * 0.38, 6, H * 0.068, 0.09, 5.5, 'gold', bloom);
  drawFlower(W * 0.60, baseY, H * 0.26, 5, H * 0.058, 0.11, 6.4, 'blue', bloom);

  drawGrass(true); // Foreground grass (covers the base of stems)

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
